name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Show Xcode Version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build (Unsigned)
        run: |
          set -o pipefail
          xcodebuild -list -json > xcodeproj-list.json
          xcodebuild -scheme LiDARScanApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build | tee xcodebuild.log

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/LiDARScanApp.app Payload/
          cd Payload
          zip -r ../LiDARScanApp.ipa .
          cd ..

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiDARScanApp-ipa
          path: LiDARScanApp.ipa
      
      - name: Upload Build Logs
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: |
            xcodebuild.log
            xcodeproj-list.json
